<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="/src/style/output.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-[#FFFDF3]">
    <div>
      <header class="bg-white shadow-sm">
        <div
          class="container mx-auto flex max-w-[1200px] items-center justify-between px-4 py-4 md:px-6 lg:px-10"
        >
          <img src="./assets/images/logo.png" alt="Logo" class="h-6 md:h-8" />
        </div>
      </header>

      <!-- Kak maaf buat yang nilai, ini kenapa belum bisa jadi kotak ditengah ya.... -->
      <!-- udah 3 harian buntu di situ kak, di halaman regsister juga sama-->
      <!-- btw baru kali ini pake tailwaind, maaf kalo belum maksimal -->

      <div class="flex items-center justify-center min-h-[90vh]">
        <div class="w-full max-w-md bg-white p-8 rounded-lg border-[0.1px]">
          <div class="text-center mb-6">
            <h2 class="text-2xl font-bold text-gray-800">Masuk ke akun</h2>
            <p class="text-gray-500 font-normal font-s">Yuk, lanjutin belajarmu di videobelajar</p>
          </div>

          <form>
            <div class="mb-4">
              <label class="block text-gray-700 text-sm font-medium mb-2" for="email">
                E-mail
                <span class="text-red-500">*</span>
              </label>
              <input type="email" id="email" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-400" required>
            </div>
            <div class="mb-4 relative">
              <label class="block text-gray-700 text-sm font-medium mb-2" for="email">
                Kata Sandi
                <span class="text-red-500">*</span>
              </label>
              <input type="password" id="password" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-400" required>
            </div>
            <div class="text-right my-4">
              <a class="text-sm text-gray-500 hover:text-gray-700" href="">Lupa Password?</a>
            </div>
            <div class="flex items-center justify-between mb-6">
              <button type="submit" class="w-full bg-green-500 hover:bg-green-600 text-white font-semibold py-2 px-4 rounded-md">
                Masuk
              </button>
            </div>
            <div class="flex items-center justify-center mb-4">
              <button class="w-full bg-green-100 hover:bg-green-200 text-green-700 font-semibold py-2 px-4 rounded-md text-center">
                Daftar
              </button>
            </div>
            <img class="my-4" src="assets/images/atau.png" alt="atau">
            <div class="flex items-center justify-center">
              <button class="w-full flex items-center justify-center bg-white border border-gray-300 hover:bg-gray-100 text-gray-700 font-semibold py-2 px-4 rounded-md">
                <img class="w-24" src="assets/images/google-icon.svg" alt="">
                Masuk dengan Google
              </button>
            </div>
          </form>
        </div>
        <div class="Toastify"></div>
      </div>
      <div class="Toastify"></div>
    </div>
  </body>
</html>
