<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register to Videobelajar</title>
    <link rel="stylesheet" href="/src/style/output.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-[#FFFDF3]">
    <div id="root">
      <header class="bg-white shadow-sm">
        <div class="container mx-auto flex max-w-[1200px] items-center justify-between px-4 py-4 md:px-6 lg:px-10">
          <img src="./assets/images/logo.png" alt="Logo" class="h-6 md:h-8" />
        </div>
      </header>

      <div class="flex items-center justify-center min-h-screen">
        <div class="w-full max-w-md bg-white p-8 rounded-lg border-[0.1px]">
          <div class="text-center mb-6">
            <h2 class="text-2xl font-bold text-gray-800">Pendaftaran Akun</h2>
            <p class="text-gray-500 font-normal font-s">Yuk, daftarkan akunmu sekarang juga!</p>
          </div>
          <form action="">
            <div class="mb-4">
              <label class="block text-gray-700 text-sm font-medium mb-2" for="name">
                Nama Lengkap
                <span class="text-red-500">*</span>
              </label>
              <input type="text" id="name" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-green-400" required>
            </div>

            <div class="mb-4">
              <label class="block text-gray-700 text-sm font-medium mb-2" for="name">
                Email
                <span class="text-red-500">*</span>
              </label>
              <input type="email" id="email" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-400" required>
            </div>

            <div class="mb-4">
              <label for="phone" class="block text-gray-700 text-sm font-medium mb-2">
                No. Hp
                <span class="text-red-500">*</span>
              </label>
              <div class="flex">
                <div class="flex items-center border border-gray-300 rounded-1-md bg-gray-100 px-4">
                  <img src="assets/images/Indonesia.png" alt="Indonesia" class="h-5 w-5">
                  <select class="text-gray-700 bg-gray-100 text-sm outline-none border-none">
                    <option value="+62">+62</option>
                  </select>
                </div>
                <input type="text" id="phone" class="w-full px-3 py-2 border border-gray-300 rounded-r-md focus:outline-none focus:ring-2 focus:ring-green-400" required>
              </div>
            </div>

            <div class="mb-4 relative">
              <label class="block text-gray-700 text-sm font-medium mb-2" for="password">
                Kata Sandi
                <span class="text-red-500">*</span>
              </label>
              <input type="password" id="password" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-400" required>
            </div>

            <div class="mb-4 relative">
              <label class="block text-gray-700 text-sm font-medium mb-2" for="password">
                Konfirmasi Kata Sandi
                <span class="text-red-500">*</span>
              </label>
              <input type="password" id="confirm-password" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-400" required>
            </div>

            <div class="text-right my-4">
              <a class="text-sm text-gray-500 hover:text-gray-700" href="/forgot-password">Lupa Password?></a>
            </div>

            <div class="flex items-center justify-between mb-6">
              <button type="submit" class="w-full bg bg-green-500 hover:bg-green-600 text-white font-semibold py-2 px-4 rounded-md">
                Daftar
              </button>
            </div>

            <div class="flex items-center justify-center mb-4">
              <a class="w-full bg-green-100 hover:bg-green-200 text-green-700 font-semibold py-2 px-4 rounded-md text-center" href="login.html">Masuk</a>
            </div>

            <img class="my-4" src="assets/images/atau.png" alt="atau">

            <div class="flex items-center justify-center">
              <button class="w-full flex items-center justify-center bg-white border border-gray-300 hover:bg-gray-100 text-gray-700 font-semibold py-2 px-4 rounded-md">
                <img class="w-24" src="assets/images/google-icon.svg" alt="google">
                Masuk dengan Google
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
