<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Boxicons -->
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />

    <title>Login Page</title>

    <style>
      body {
        font-family: "Poppins", sans-serif;
      }
    </style>
  </head>

  <body class="bg-[#FFFDF3] min-h-screen">
    <!-- Navbar -->
    <nav class="bg-white border-b border-gray-200">
      <div class="max-w-7xl mx-auto px-6 lg:px-12 h-20 flex items-center">
        <img src="./assets/images/logo.png" alt="videobelajar" />
      </div>
    </nav>

    <!-- Login Section -->
    <section class="flex items-center justify-center px-4 py-16">
      <div
        class="bg-white w-full max-w-xl rounded-md border border-gray-200 p-8 md:p-10"
      >
        <!-- Title -->
        <div class="text-center mb-8">
          <h2 class="text-3xl font-bold text-gray-900">Pendaftaran Akun</h2>
          <p class="text-gray-500 mt-3">Yuk, daftarkan akunmu sekarang juga!</p>
        </div>

        <!-- Form -->
        <form class="space-y-5">
          <!-- Nama Lengkap -->
          <div>
            <label class="block text-gray-700 mb-2 font-medium">
              Nama Lengkap <span class="text-red-500">*</span>
            </label>

            <input
              type="text"
              class="w-full h-12 border border-gray-200 rounded-lg px-4 outline-none focus:ring-2 focus:ring-green-400"
              required
              />
          </div>
          
          <!-- Email -->
          <div>
            <label class="block text-gray-700 mb-2 font-medium">
              E-Mail <span class="text-red-500">*</span>
            </label>

            <input
              type="email"
              class="w-full h-12 border border-gray-200 rounded-lg px-4 outline-none focus:ring-2 focus:ring-green-400"
              required
              />
          </div>

          <!-- No. HP -->
          <div class="mb-4">
            <label
              for="phone"
              class="block text-gray-700 text-sm font-medium mb-2"
            >
              No. Hp
              <span class="text-red-500">*</span>
            </label>
            <div class="flex">
              <div
                class="flex items-center border border-gray-300 rounded-1-md bg-gray-100 px-4"
              >
                <img
                  src="assets/images/Indonesia.png"
                  alt="Indonesia"
                  class="h-5 w-5"
                />
                <select
                  class="text-gray-700 bg-gray-100 text-sm outline-none border-none"
                >
                  <option value="+62">+62</option>
                </select>
              </div>
              <input
                type="text"
                id="phone"
                class="w-full px-3 py-2 border border-gray-300 rounded-r-md focus:outline-none focus:ring-2 focus:ring-green-400"
                required
              />
            </div>
          </div>

          <!-- Password -->
          <div>
            <label class="block text-gray-700 mb-2 font-medium">
              Kata Sandi <span class="text-red-500">*</span>
            </label>

            <div class="relative">
              <input
                type="password"
                class="w-full h-12 border border-gray-200 rounded-lg px-4 pr-12 outline-none focus:ring-2 focus:ring-green-400"
                required
                />

              <i
                class="bx bx-hide absolute right-4 top-1/2 -translate-y-1/2 text-2xl text-gray-500 cursor-pointer"
              ></i>
            </div>
          </div>

          <!-- Password -->
          <div>
            <label class="block text-gray-700 mb-2 font-medium">
              Konfirmasi Kata Sandi <span class="text-red-500">*</span>
            </label>

            <div class="relative">
              <input
                type="password"
                class="w-full h-12 border border-gray-200 rounded-lg px-4 pr-12 outline-none focus:ring-2 focus:ring-green-400"
                 required              
                />

              <i
                class="bx bx-hide absolute right-4 top-1/2 -translate-y-1/2 text-2xl text-gray-500 cursor-pointer"
              ></i>
            </div>
          </div>

          <!-- Lupa Password-->
          <div class="text-right mt-3">
            <a href="#" class="text-gray-600 font-medium hover:text-green-500">
              Lupa Password?
            </a>
          </div>

          <!-- Button Login -->
          <button
            class="w-full h-12 bg-[#37C84B] hover:bg-[#2eb142] transition rounded-xl text-white font-semibold text-lg"
          >
            Masuk
          </button>

          <!-- Button Register -->
          <button
            type="button"
            class="w-full h-12 bg-[#DDF2D9] hover:bg-[#cfe8ca] transition rounded-xl text-[#37C84B] font-semibold text-lg"
          >
            Daftar
          </button>

          <!-- Divider -->
          <div class="flex items-center gap-4 py-2">
            <div class="flex-1 h-px bg-gray-300"></div>
            <span class="text-gray-500">atau</span>
            <div class="flex-1 h-px bg-gray-300"></div>
          </div>

          <!-- Google Login -->
          <button
            type="button"
            class="w-full h-12 border border-gray-200 rounded-xl flex items-center justify-center gap-3 hover:bg-gray-50 transition"
          >
            <img
              src="./assets/images/google.png"
              alt="google"
              class="w-6 h-6"
            />

            <span class="font-semibold text-gray-700">
              Masuk dengan Google
            </span>
          </button>
        </form>
      </div>
    </section>
  </body>
</html>
